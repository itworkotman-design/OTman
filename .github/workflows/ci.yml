name: CI

on:
  push:
    branches:
      - main
      - auth-sys-migTrue
      - feat/**
      - fix/**
      - chore/**
      - test/**
  pull_request:

jobs:
  test-and-typecheck:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: otman_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d otman_ci"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/otman_ci?schema=public
      PRISMA_CLIENT_ENGINE_TYPE: binary
      CI: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply Prisma migrations
        run: npx prisma migrate deploy

      - name: Run tests
        run: npm test -- --run

      - name: Run typecheck
        run: npm run typecheck