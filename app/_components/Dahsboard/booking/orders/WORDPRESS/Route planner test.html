<!-- 2) Google Maps autocomplete + strict KM calculation (passive on load, responsive to edits/clears) -->
<script>
document.addEventListener("DOMContentLoaded", function () {
  const geocoder = new google.maps.Geocoder();
  const placeCache = new Map();
  const RETURN_SELECTOR = 'input[name*="field_68499231b558f"]';

  // ---------- visibility
  function isVisible(el) {
    if (!el) return false;
    const field = el.closest?.('.acf-field') || el;
    const st = window.getComputedStyle(field);
    return !field.classList.contains('acf-hidden') &&
           st.display !== 'none' && st.visibility !== 'hidden' &&
           (field.offsetWidth || field.getClientRects().length);
  }

  // ---------- helpers
  const getReturnInput = () => document.querySelector(RETURN_SELECTOR);

  // Gate: do not touch KM field until user interacts OR you opt-in via window.enableKmWrites()
  let KM_WRITE_ALLOWED = false;
  function enableKmWrites(){ KM_WRITE_ALLOWED = true; }
  window.enableKmWrites = enableKmWrites;

  // Any real interaction unlocks KM writes
  ['pointerdown','keydown','touchstart','focusin'].forEach(evt => {
    document.addEventListener(evt, () => { KM_WRITE_ALLOWED = true; }, { once:true, capture:true });
  });

  // ---------- acceptance
  const STRICT_TYPES = new Set(["street_address","premise","route","establishment","subpremise"]);
  const STRICT_LOC   = new Set(["ROOFTOP","RANGE_INTERPOLATED"]);
  const LOOSE_TYPES  = new Set(["street_address","premise","route","establishment","subpremise","locality","political"]);
  const LOOSE_LOC    = new Set(["ROOFTOP","RANGE_INTERPOLATED","GEOMETRIC_CENTER","APPROXIMATE"]);

  function isPlausiblePrefilledAddressStrict(str) {
    const s = (str || "").trim();
    if (!s) return false;
    const hasDigit = /\d/.test(s);
    const hasComma = s.includes(",");
    const hasPostalNO = /\b\d{4}\b/.test(s);
    return (hasDigit || hasComma || hasPostalNO) && s.length >= 6;
  }

  function confirmAllowed(result, loose) {
    const types = result.types || [];
    const locType = result.geometry && result.geometry.location_type;
    const tset = loose ? LOOSE_TYPES : STRICT_TYPES;
    const lset = loose ? LOOSE_LOC   : STRICT_LOC;
    return types.some(t => tset.has(t)) && lset.has(locType);
  }

  // ---------- ensure placeId (loose=true only for Return)
  async function ensurePlaceIdForInput(input, allowBootstrapFromPrefill, loose = false) {
    if (!input) return "";
    const val = (input.value || "").trim();
    if (!val) { delete input.dataset.placeId; return ""; }
    if (input.dataset.placeId) return { placeId: input.dataset.placeId };
    if (!allowBootstrapFromPrefill) return "";

    const okPrefill = loose ? (val.length >= 3) : isPlausiblePrefilledAddressStrict(val);
    if (!okPrefill) return "";

    if (placeCache.has(val)) {
      const pid = placeCache.get(val);
      input.dataset.placeId = pid;
      return { placeId: pid };
    }

    const pid = await new Promise((resolve) => {
      geocoder.geocode({ address: val, componentRestrictions: { country: "NO" } },
        (results, status) => {
          if (status === "OK" && results?.[0] && confirmAllowed(results[0], loose)) resolve(results[0].place_id);
          else resolve("");
        });
    });

    if (pid) { placeCache.set(val, pid); input.dataset.placeId = pid; return { placeId: pid }; }
    return "";
  }

  // ---------- autocomplete (no change events fired on init)
  function initAutocomplete(input) {
    if (!input || input.name.includes("acfcloneindex")) return;
    if (input.dataset.autocompleteInitialized) return;
    input.dataset.autocompleteInitialized = "true";

    const invalidate = () => { delete input.dataset.placeId; };
    input.addEventListener("input", invalidate);
    input.addEventListener("paste", invalidate);

    const ac = new google.maps.places.Autocomplete(input);
    ac.addListener("place_changed", () => {
      KM_WRITE_ALLOWED = true; // user picked a place

      const place = ac.getPlace();
      if (!place || !place.address_components) return;

      const postal = place.address_components.find(c => c.types?.includes("postal_code"))?.long_name || "";
      const street = place.formatted_address || input.value || "";
      let full = street;
      if (place.name && !street.includes(place.name)) full = `${place.name}, ${street}`;
      if (postal && !full.includes(postal)) full += `, ${postal}`;

      input.value = full;                       // do NOT dispatch change here
      if (place.place_id) input.dataset.placeId = place.place_id;

      // Calculate after selection (allowed by user interaction)
      setTimeout(() => calculateTotalDistance(true), 10);
    });
  }

  function initAllAutocompletes(root = document) {
    const sels = [
      'input[name*="field_68248210acd3d"]:not([name*="[acfcloneindex]"])',
      'input[name*="field_6824829aacd40"]:not([name*="[acfcloneindex]"])',
      'input[name*="field_68248274acd3f"]:not([name*="[acfcloneindex]"])',
      `${RETURN_SELECTOR}:not([name*="[acfcloneindex]"])`
    ];
    root.querySelectorAll(sels.join(",")).forEach(initAutocomplete);
  }

  // ---------- KM setter (no writes when gated)
  function setKmValue(totalKmInput, newVal) {
    if (!KM_WRITE_ALLOWED) return;
    if (!totalKmInput) return;
    if (totalKmInput.value === newVal) return;
    totalKmInput.value = newVal;
    totalKmInput.dispatchEvent(new Event("change", { bubbles: true }));
  }

  // ---------- allowBootstrap heuristic (like before, but Return only if visible)
  function allowBootstrapDynamic() {
    const inputs = [
      ...document.querySelectorAll('input[name*="field_68248210acd3d"]:not([name*="[acfcloneindex]"])'),
      ...document.querySelectorAll('input[name*="field_6824829aacd40"]:not([name*="[acfcloneindex]"])'),
      ...document.querySelectorAll('input[name*="field_68248274acd3f"]:not([name*="[acfcloneindex]"])')
    ];
    const ret = getReturnInput();
    if (ret && isVisible(ret)) inputs.push(ret);
    return inputs.some(i => i && (i.value || "").trim() && !i.dataset.placeId);
  }

  // ---------- distance calc
  async function calculateTotalDistance(allowBootstrapFromPrefill) {
    const pickupInput   = document.querySelector('input[name*="field_68248210acd3d"]');
    const deliveryInput = document.querySelector('input[name*="field_6824829aacd40"]');
    const extraInputs   = document.querySelectorAll('input[name*="field_68248274acd3f"]');
    const returnInput   = getReturnInput();
    const totalKmInput  = document.querySelector('input[name*="field_682482a1acd41"]');
    if (!pickupInput || !deliveryInput || !totalKmInput) return;

    const origin      = await ensurePlaceIdForInput(pickupInput,   allowBootstrapFromPrefill, false);
    const deliveryLoc = await ensurePlaceIdForInput(deliveryInput, allowBootstrapFromPrefill, false);

    const okOrigin   = origin && typeof origin === "object" && origin.placeId;
    const okDelivery = deliveryLoc && typeof deliveryLoc === "object" && deliveryLoc.placeId;
    if (!okOrigin || !okDelivery) { setKmValue(totalKmInput, ""); return; }

    const waypoints = [];
    for (const i of Array.from(extraInputs)) {
      const loc = await ensurePlaceIdForInput(i, allowBootstrapFromPrefill, false);
      if (loc && typeof loc === "object" && loc.placeId) waypoints.push({ stopover: true, location: loc });
    }

    let useReturn = false;
    let returnLoc = "";
    if (returnInput && isVisible(returnInput)) {
      returnLoc = await ensurePlaceIdForInput(returnInput, allowBootstrapFromPrefill, true);
      useReturn = !!(returnLoc && typeof returnLoc === "object" && returnLoc.placeId);
    }

    let finalDestination = deliveryLoc;
    if (useReturn) { waypoints.push({ location: deliveryLoc, stopover: true }); finalDestination = returnLoc; }

    const ds = new google.maps.DirectionsService();
    ds.route(
      { origin, destination: finalDestination, waypoints, travelMode: google.maps.TravelMode.DRIVING, optimizeWaypoints: false },
      (response, status) => {
        if (status === "OK" && response?.routes?.[0]) {
          const meters = (response.routes[0].legs || []).reduce((sum, leg) => sum + (leg.distance?.value || 0), 0);
          const km = (meters / 1000).toFixed(2);
          setKmValue(totalKmInput, km);
        } else {
          setKmValue(totalKmInput, "");
          console.error("Directions request failed:", status);
        }
      }
    );
  }

  // ---------- edits/clears => recalc (responsive behaviour)
  function debounce(fn, wait){ let t; return () => { clearTimeout(t); t = setTimeout(fn, wait); }; }
  const debouncedCalc = debounce(() => calculateTotalDistance(allowBootstrapDynamic()), 250);

  const watchedSelectors = [
    'input[name*="field_68248210acd3d"]:not([name*="[acfcloneindex]"])',
    'input[name*="field_6824829aacd40"]:not([name*="[acfcloneindex]"])',
    'input[name*="field_68248274acd3f"]:not([name*="[acfcloneindex]"])',
    `${RETURN_SELECTOR}:not([name*="[acfcloneindex]"])`
  ];

  document.querySelectorAll(watchedSelectors.join(",")).forEach(i => {
    const unlock = () => { KM_WRITE_ALLOWED = true; };

    // Typing, backspace, clear button, paste/cut — all trigger recalculation
    i.addEventListener("input", () => {
      unlock();
      if ((i.value || "").trim() === "") delete i.dataset.placeId;
      debouncedCalc();
    }, { passive: true });

    i.addEventListener("change", () => { unlock(); debouncedCalc(); }, { passive: true });
    i.addEventListener("paste",  () => { unlock(); setTimeout(debouncedCalc, 0); }, { passive: true });
    i.addEventListener("cut",    () => { unlock(); setTimeout(debouncedCalc, 0); }, { passive: true });
    i.addEventListener("keyup",  (ev) => {
      if (ev.key === "Backspace" || ev.key === "Delete") { unlock(); debouncedCalc(); }
    }, { passive: true });

    // Touch-specific nudge (helps some mobile “clear” UX)
    i.addEventListener("touchend", () => { unlock(); setTimeout(debouncedCalc, 0); }, { passive: true });
  });

  // ---------- init (passive)
  initAllAutocompletes();

  // Expose
  window.calculateTotalDistance = (allow) => calculateTotalDistance(!!allow);
  window.ensurePlaceIdForInput = ensurePlaceIdForInput;
  window.__kmGate = { get allowed(){ return KM_WRITE_ALLOWED; }, allow: enableKmWrites };
});
</script>




<script>
/* Recalc total KM whenever Returadresse is shown/hidden (ACF or CSS) */
(function(){
  const RETURN_SELECTOR = 'input[name*="field_68499231b558f"]';

  function getReturnInput(){ return document.querySelector(RETURN_SELECTOR); }
  function getReturnWrapper(){
    const i = getReturnInput();
    return i?.closest('.acf-field') || i || null;
  }

  function recalcNow(){
    // allow KM writes (counts as user-intent toggle)
    try { (window.__kmGate?.allow || window.enableKmWrites || function(){})(); } catch(_) {}
    // recalc without emitting input/change
    try { window.calculateTotalDistance && window.calculateTotalDistance(true); } catch(_) {}
  }

  function attachObservers(){
    const wrap = getReturnWrapper();
    if (!wrap || wrap.dataset.kmVisObs) return;
    wrap.dataset.kmVisObs = '1';

    // Watch class/style flips (non-ACF toggles too)
    const mo = new MutationObserver(() => { setTimeout(recalcNow, 0); });
    mo.observe(wrap, { attributes: true, attributeFilter: ['class','style'] });

    // run once now in case state already changed
    setTimeout(recalcNow, 0);
  }

  function hookACF(){
    if (!window.acf?.addAction) return;

    const maybeRecalc = ($el) => {
      const el = $el?.[0] || $el;
      if (!el) return;
      if (el.querySelector?.(RETURN_SELECTOR)) setTimeout(recalcNow, 0);
    };

    acf.addAction('hide_field',  maybeRecalc);
    acf.addAction('show_field',  maybeRecalc);
    acf.addAction('append',      () => setTimeout(attachObservers, 0));
    acf.addAction('ready',       () => setTimeout(attachObservers, 0));
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', () => { attachObservers(); hookACF(); });
  } else {
    attachObservers(); hookACF();
  }
})();
</script>

(function () {
  const PICKUP_SEL = 'input[name*="field_68248210acd3d"]';   // henteadresse
  const RETURN_SEL = 'input[name*="field_68499231b558f"]';   // returadresse
  const WAIT_MS = 200;

  const book = Object.fromEntries(
    Object.entries(window.USER_ADDRESS_BOOK || {}).map(([k, v]) => [String(k).toLowerCase(), v])
  );

  function isEditingExistingPost() {
    const sels = [
      'input[name="post_ID"]',
      'input[name="post_id"]',
      'input[name="acff[post_id]"]',
      'input[name="acff[post][ID]"]'
    ];
    for (const sel of sels) {
      const el = document.querySelector(sel);
      if (!el) continue;
      const raw = (el.value || '').trim();
      const num = parseInt(raw, 10);
      if (!isNaN(num) && num > 0) return true;
    }
    return false;
  }

  function fieldIsTrulyEmpty(input) {
    if (!input) return true;
    const val = (input.value || '').trim();
    const hasPid = !!input.dataset.placeId;
    return val === '' && !hasPid;
  }

  function waitForAfterAutofill(cb, deadlineMs = 3000, intervalMs = 50) {
    const start = Date.now();
    (function tick(){
      if (typeof window.afterAutofill === 'function') return cb();
      if (Date.now() - start >= deadlineMs) return;
      setTimeout(tick, intervalMs);
    })();
  }

  function runAutofill() {
    // ✅ Only for NEW posts
    if (isEditingExistingPost()) return;

    const rawKey = window.CURRENT_USER_KEY || '';
    const key = String(rawKey).toLowerCase();
    const cfg = book[key];
    if (!cfg) return;

    waitForAfterAutofill(() => {
      setTimeout(() => {
        const pickupInput = document.querySelector(PICKUP_SEL);
        const returnInput = document.querySelector(RETURN_SEL);

        // Fill only if truly empty (no text and no placeId)
        if (pickupInput && cfg.pickupAddress && fieldIsTrulyEmpty(pickupInput)) {
          window.afterAutofill(pickupInput, {
            formatted: cfg.pickupAddress,
            placeId: cfg.pickupPlaceId || undefined
          });
        }
        if (returnInput && cfg.returnAddress && fieldIsTrulyEmpty(returnInput)) {
          window.afterAutofill(returnInput, {
            formatted: cfg.returnAddress,
            placeId: cfg.returnPlaceId || undefined
          });
        }
      }, WAIT_MS);
    });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', () => setTimeout(runAutofill, WAIT_MS));
  } else {
    setTimeout(runAutofill, WAIT_MS);
  }

  // Respect the same rule when Return appears later
  if (window.acf && typeof acf.addAction === 'function') {
    acf.addAction('show_field', $el => {
      const el = $el && $el[0] ? $el[0] : $el;
      const input = el && el.querySelector && el.querySelector(RETURN_SEL);
      if (!input) return;

      // ✅ Only for NEW posts and only if truly empty
      if (isEditingExistingPost()) return;

      const rawKey = window.CURRENT_USER_KEY || '';
      const key = String(rawKey).toLowerCase();
      const cfg = book[key];
      if (cfg && fieldIsTrulyEmpty(input)) {
        waitForAfterAutofill(() => {
          window.afterAutofill(input, {
            formatted: cfg.returnAddress,
            placeId: cfg.returnPlaceId || undefined
          });
        });
      }
    });
  }
})();
</script>

<!-- 4) afterAutofill helper (adds "loose" geocode for Return + triggers KM) -->
<script>
(function () {
  async function afterAutofill(input, { formatted, placeId } = {}) {
    if (!input) return;

    // 1) Set visible value
    if (typeof formatted === 'string') input.value = formatted;

    // 2) Ensure we have a placeId on the element
    if (!placeId && formatted && window.google?.maps?.Geocoder) {
      try {
        // If it's the Return field, use loose geocoding to accept towns/localities
        if (input.matches('input[name*="field_68499231b558f"]')) {
          placeId = await geocodeToPlaceIdLoose(formatted);
        } else {
          placeId = await geocodeToPlaceIdStrict(formatted);
        }
      } catch (_) {}
    }
    if (placeId) input.dataset.placeId = placeId;

    // 3) Fire broad events so other listeners react
    fireAll(input);

    // 4) Kick the distance calc (allow bootstrap so prefilled counterparts are accepted)
    if (typeof window.calculateTotalDistance === 'function') {
      try { window.calculateTotalDistance(true); } catch (_) {}
    } else {
      tryCallAny(['recalculateKm','recomputeKM','computeDistance','updateKm','calculateAndFillKm','updateTotalKm']);
    }
  }

  function fireAll(el) {
    el.dispatchEvent(new Event('input',  { bubbles: true }));
    el.dispatchEvent(new Event('change', { bubbles: true }));
    el.dispatchEvent(new Event('blur',   { bubbles: true }));
    if (window.jQuery) {
      const $el = jQuery(el);
      $el.trigger('input').trigger('change');
      if (window.acf?.doAction) acf.doAction('change', $el);
    }
  }

  function tryCallAny(names) {
    for (const name of names) {
      if (typeof window[name] === 'function') {
        try { window[name](); } catch (_) {}
        break;
      }
    }
  }

  function geocode(address, loose = false) {
    const LOOSE_TYPES  = new Set(["street_address","premise","route","establishment","subpremise","locality","political"]);
    const LOOSE_LOC    = new Set(["ROOFTOP","RANGE_INTERPOLATED","GEOMETRIC_CENTER","APPROXIMATE"]);
    const STRICT_TYPES = new Set(["street_address","premise","route","establishment","subpremise"]);
    const STRICT_LOC   = new Set(["ROOFTOP","RANGE_INTERPOLATED"]);

    return new Promise((resolve, reject) => {
      const geocoder = new google.maps.Geocoder();
      geocoder.geocode({ address, componentRestrictions: { country: 'NO' } }, (results, status) => {
        if (status !== 'OK' || !results?.[0]) return reject(status);
        const r = results[0];
        const okType = (r.types || []).some(t => (loose ? LOOSE_TYPES : STRICT_TYPES).has(t));
        const okLoc  = (loose ? LOOSE_LOC : STRICT_LOC).has(r.geometry?.location_type);
        if (okType && okLoc) resolve(r.place_id);
        else reject('UNSUPPORTED_RESULT');
      });
    });
  }

  function geocodeToPlaceIdStrict(address) { return geocode(address, /*loose*/ false); }
  function geocodeToPlaceIdLoose(address)  { return geocode(address, /*loose*/ true);  }

  window.afterAutofill = afterAutofill;
})();
</script>




<script>
(function () {
  const RETURN_SEL = 'input[name*="field_68499231b558f"]'; // Returadresse
  const PICKUP_SEL = 'input[name*="field_68248210acd3d"]'; // Henteadresse

  // ---- helpers
  const getForm        = () => document.querySelector('form');
  const getReturnInput = () => document.querySelector(RETURN_SEL);
  const getPickupInput = () => document.querySelector(PICKUP_SEL);

  function isBoxVisible(el){
    if (!el) return false;
    const st = window.getComputedStyle(el);
    return !el.classList.contains('acf-hidden') &&
           st.display !== 'none' && st.visibility !== 'hidden' &&
           (el.offsetWidth || el.getClientRects().length);
  }
  function isInputVisible(input){
    return !!(input && isBoxVisible(input.closest('.acf-field') || input));
  }

  function isEditingExistingPost() {
    const sels = ['input[name="post_ID"]','input[name="post_id"]','input[name="acff[post_id]"]','input[name="acff[post][ID]"]'];
    for (const sel of sels) {
      const el = document.querySelector(sel);
      const n = parseInt((el?.value||'').trim(), 10);
      if (!isNaN(n) && n > 0) return true;
    }
    return false;
  }

  function fieldIsTrulyEmpty(input){
    if (!input) return true;
    const v = (input.value || '').trim();
    return v === '' && !input.dataset.placeId;
  }

  function getUserDefaults(){
    const key  = String(window.CURRENT_USER_KEY || '').toLowerCase();
    const book = Object.fromEntries(
      Object.entries(window.USER_ADDRESS_BOOK || {}).map(([k,v]) => [String(k).toLowerCase(), v])
    );
    return book[key] || null;
  }

  // ---- silent autofill (no input/change events)
  let didAutofill = false;
  async function silentAutofillReturn(){
    if (didAutofill) return;
    const input = getReturnInput();
    if (!input || !isInputVisible(input)) return;
    if (isEditingExistingPost()) return;
    if (!fieldIsTrulyEmpty(input)) return;

    const cfg = getUserDefaults();
    if (!cfg || !cfg.returnAddress) return;

    // set value quietly
    input.value = cfg.returnAddress;

    // ensure placeId (loose) and recalc distance
    try {
      if (!input.dataset.placeId && typeof window.ensurePlaceIdForInput === 'function') {
        const res = await window.ensurePlaceIdForInput(input, /*allowBootstrap*/ true, /*loose*/ true);
        if (res && res.placeId) input.dataset.placeId = res.placeId;
      }
    } catch(_) {}

    try { if (typeof window.calculateTotalDistance === 'function') window.calculateTotalDistance(true); } catch (_) {}

    didAutofill = true;
  }

  // ---- visibility watch for Return wrapper (no events fired)
  function watchReturnVisibleAndAutofill(){
    const input   = getReturnInput();
    if (!input) return;
    const wrapper = input.closest('.acf-field') || input;

    let timer = null;
    const kick = () => {
      clearTimeout(timer);
      // wait a short moment after visibility changes settle
      timer = setTimeout(() => { if (isInputVisible(input)) silentAutofillReturn(); }, 350);
    };

    // initial try (in case it's already visible)
    if (isInputVisible(input)) {
      setTimeout(silentAutofillReturn, 350);
    }

    const mo = new MutationObserver(kick);
    mo.observe(wrapper, { attributes: true, attributeFilter: ['class','style'] });

    // clean-up not strictly needed here; page will unload
  }

  // ---- focus fallback (if user taps the field, still autofill)
  function attachFocusFallback(){
    const input = getReturnInput();
    if (!input) return;
    const onFocusOnce = () => { silentAutofillReturn(); };
    input.addEventListener('focusin', onFocusOnce, { once: true });
  }

  // ---- 2s failsafe (in case observers miss the exact moment)
  function attachFailsafe(){
    setTimeout(() => { if (!didAutofill) silentAutofillReturn(); }, 2000);
  }

  // ---- submit-time wipe (only for hidden fields; keeps your payload clean)
  function forceEmpty(form, input){
    const name = input.getAttribute('name');
    if (!name) return;
    if (form.querySelector(`input[type="hidden"][data-empty-for="${CSS.escape ? CSS.escape(name) : name}"]`)) return;
    const h = document.createElement('input');
    h.type = 'hidden';
    h.name = name;
    h.value = '';
    h.setAttribute('data-empty-for', name);
    form.appendChild(h);
  }
  function wipeHiddenOnSubmit(form){
    [PICKUP_SEL, RETURN_SEL].forEach(sel => {
      document.querySelectorAll(sel).forEach(input => {
        const hidden = !isInputVisible(input);
        if (hidden) {
          forceEmpty(form, input);
          input.disabled = true;
        } else {
          input.disabled = false;
        }
      });
    });
  }
  function reenableIfDisabled(){
    [getPickupInput(), getReturnInput()].forEach(i => { if (i) i.disabled = false; });
    const form = getForm();
    if (form) form.querySelectorAll('input[data-empty-for]').forEach(h => h.remove());
  }
  function attachSubmitHook(){
    const form = getForm();
    if (!form || form.dataset.retWipeAttached) return;
    form.dataset.retWipeAttached = '1';
    form.addEventListener('submit', () => wipeHiddenOnSubmit(form), { capture: true });
    if (window.acf?.addAction) {
      acf.addAction('validation_failure', reenableIfDisabled);
      acf.addAction('submit_fail', reenableIfDisabled);
    }
  }

  // ---- boot
  function boot(){
    attachSubmitHook();
    watchReturnVisibleAndAutofill();
    attachFocusFallback();
    attachFailsafe();

    // If ACF shows blocks later, just re-arm the watchers/fallbacks; still no events fired
    if (window.acf?.addAction) {
      const rearm = () => {
        setTimeout(() => {
          watchReturnVisibleAndAutofill();
          attachFocusFallback();
          attachFailsafe();
        }, 0);
      };
      acf.addAction('append', rearm);
      acf.addAction('show_field', rearm);
      acf.addAction('ready', rearm);
    }
  }

  if (window.acf?.addAction) {
    acf.addAction('ready', () => setTimeout(boot, 0));
  } else if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', boot);
  } else {
    boot();
  }
})();
</script>

<script>
document.addEventListener("DOMContentLoaded", function () {
  const geocoder = new google.maps.Geocoder();
  const placeCache = new Map(); // address -> place_id
  const RETURN_SELECTOR = 'input[name*="field_68499231b558f"]';

  // Only geocode prefilled text on load if it looks like a real address.
  const ALLOWED_RESULT_TYPES = new Set([
    "street_address", "premise", "route", "establishment", "subpremise"
  ]);
  const ALLOWED_LOCATION_TYPES = new Set(["ROOFTOP", "RANGE_INTERPOLATED"]);
  function isPlausiblePrefilledAddress(str) {
    const s = (str || "").trim();
    if (!s) return false;
    // Must contain a comma or a digit (house no./postal code), and be at least 6 chars.
    const hasDigit = /\d/.test(s);
    const hasComma = s.includes(",");
    const hasPostalNO = /\b\d{4}\b/.test(s); // Norwegian postal code
    return (hasDigit || hasComma || hasPostalNO) && s.length >= 6;
  }

  function confirmGeocodeResultAllowed(result) {
    const types = result.types || [];
    const locType = result.geometry && result.geometry.location_type;
    const typeAllowed = types.some(t => ALLOWED_RESULT_TYPES.has(t));
    const locAllowed = ALLOWED_LOCATION_TYPES.has(locType);
    return typeAllowed && locAllowed;
  }

  // After load, users must select from autocomplete; free text is rejected.
  let BOOTSTRAP_DONE = false;

  async function ensurePlaceIdForInput(input, allowBootstrapFromPrefill) {
    if (!input) return "";
    const val = (input.value || "").trim();

    // Empty: drop stale id
    if (!val) { delete input.dataset.placeId; return ""; }

    // Already confirmed
    if (input.dataset.placeId) return { placeId: input.dataset.placeId };

    // If not bootstrapping, refuse free text
    if (!allowBootstrapFromPrefill) return "";

    // Strict bootstrap: only attempt if it *looks* like an address
    if (!isPlausiblePrefilledAddress(val)) return "";

    // Cached?
    if (placeCache.has(val)) {
      const pid = placeCache.get(val);
      input.dataset.placeId = pid;
      return { placeId: pid };
    }

    // Geocode with strict acceptance
    const pid = await new Promise((resolve) => {
      geocoder.geocode(
        { address: val, componentRestrictions: { country: "NO" } },
        (results, status) => {
          if (status === "OK" && results && results[0] && confirmGeocodeResultAllowed(results[0])) {
            resolve(results[0].place_id);
          } else {
            resolve("");
          }
        }
      );
    });

    if (pid) {
      placeCache.set(val, pid);
      input.dataset.placeId = pid;
      return { placeId: pid };
    }

    // Not accepted -> refuse
    return "";
  }

  function initAutocomplete(input) {
    if (!input || input.name.includes("acfcloneindex")) return;
    if (input.dataset.autocompleteInitialized) return;
    input.dataset.autocompleteInitialized = "true";

    // Any typing/paste invalidates a previous selection
    const invalidate = () => { delete input.dataset.placeId; };
    input.addEventListener("input", invalidate);
    input.addEventListener("paste", invalidate);

    const autocomplete = new google.maps.places.Autocomplete(input);
    autocomplete.addListener("place_changed", () => {
      const place = autocomplete.getPlace();
      if (!place || !place.address_components) return;

      const postalCodeComp = place.address_components.find(c =>
        Array.isArray(c.types) && c.types.includes("postal_code")
      );
      const postalCode = postalCodeComp ? postalCodeComp.long_name : "";
      const street = place.formatted_address || input.value || "";

      let fullAddress = street;
      if (place.name && !street.includes(place.name)) {
        fullAddress = `${place.name}, ${street}`;
      }
      if (postalCode && !fullAddress.includes(postalCode)) {
        fullAddress += `, ${postalCode}`;
      }

      input.value = fullAddress;
      if (place.place_id) {
        input.dataset.placeId = place.place_id; // confirmed selection
      }

      setTimeout(() => {
        input.dispatchEvent(new Event("change", { bubbles: true }));
        calculateTotalDistance(false);
      }, 50);
    });
  }

  function initAllAutocompletes() {
    const selectors = [
      'input[name*="field_68248210acd3d"]',  // pickup
      'input[name*="field_6824829aacd40"]',  // delivery
      'input[name*="field_68248274acd3f"]',  // extra pickups
      RETURN_SELECTOR                         // return
    ];
    document.querySelectorAll(selectors.join(",")).forEach(initAutocomplete);
  }

  function debounce(fn, wait) {
    let t;
    return function () { clearTimeout(t); t = setTimeout(fn, wait); };
  }

  async function calculateTotalDistance(allowBootstrapFromPrefill) {
    const pickupInput   = document.querySelector('input[name*="field_68248210acd3d"]');
    const deliveryInput = document.querySelector('input[name*="field_6824829aacd40"]');
    const extraInputs   = document.querySelectorAll('input[name*="field_68248274acd3f"]');
    const returnInput   = document.querySelector(RETURN_SELECTOR);
    const totalKmInput  = document.querySelector('input[name*="field_682482a1acd41"]');
    if (!pickupInput || !deliveryInput || !totalKmInput) return;

    const clearKm = () => {
      totalKmInput.value = "";
      totalKmInput.dispatchEvent(new Event("change", { bubbles: true }));
    };

    const origin      = await ensurePlaceIdForInput(pickupInput,   allowBootstrapFromPrefill);
    const deliveryLoc = await ensurePlaceIdForInput(deliveryInput, allowBootstrapFromPrefill);

    // Must have confirmed place_id for both
    const okOrigin   = origin && typeof origin === "object" && origin.placeId;
    const okDelivery = deliveryLoc && typeof deliveryLoc === "object" && deliveryLoc.placeId;
    if (!okOrigin || !okDelivery) { clearKm(); return; }

    // Waypoints: confirmed only
    const waypoints = [];
    for (const i of Array.from(extraInputs)) {
      const loc = await ensurePlaceIdForInput(i, allowBootstrapFromPrefill);
      if (loc && typeof loc === "object" && loc.placeId) {
        waypoints.push({ stopover: true, location: loc });
      }
    }

    // Return leg only if confirmed
    const returnLoc = returnInput ? await ensurePlaceIdForInput(returnInput, allowBootstrapFromPrefill) : "";
    let finalDestination = deliveryLoc;
    if (returnInput && returnLoc && typeof returnLoc === "object" && returnLoc.placeId) {
      waypoints.push({ location: deliveryLoc, stopover: true });
      finalDestination = returnLoc;
    }

    const ds = new google.maps.DirectionsService();
    ds.route(
      {
        origin,
        destination: finalDestination,
        waypoints,
        travelMode: google.maps.TravelMode.DRIVING,
        optimizeWaypoints: false
      },
      (response, status) => {
        if (status === "OK" && response && response.routes && response.routes[0]) {
          const legs = response.routes[0].legs || [];
          const meters = legs.reduce((sum, leg) => sum + (leg.distance ? leg.distance.value : 0), 0);
          const km = meters / 1000;
          totalKmInput.value = km.toFixed(2);
          totalKmInput.dispatchEvent(new Event("change", { bubbles: true }));
        } else {
          clearKm();
          console.error("Directions request failed:", status);
        }
      }
    );
  }

  // Init
  initAllAutocompletes();

  // Re-init after ACF appends a new layout
  if (window.acf && typeof acf.addAction === "function") {
    acf.addAction("append", $el => {
      const el = $el && $el[0] ? $el[0] : $el;
      if (!el) return;
      el.querySelectorAll("input").forEach(i => i.removeAttribute("data-autocomplete-initialized"));
      initAllAutocompletes();
    });
  }

  // Listen to changes; after bootstrap we forbid free-text routing
  const watchedSelectors = [
    'input[name*="field_68248210acd3d"]',
    'input[name*="field_6824829aacd40"]',
    'input[name*="field_68248274acd3f"]',
    RETURN_SELECTOR
  ];
  const debouncedCalc = debounce(() => calculateTotalDistance(false), 400);
  document.querySelectorAll(watchedSelectors.join(",")).forEach(i => {
    // Clearing text drops stale placeId
    i.addEventListener("input", () => {
      if ((i.value || "").trim() === "") delete i.dataset.placeId;
      debouncedCalc();
    });
    i.addEventListener("change", debouncedCalc);
  });

  // First calculation on load:
  // Try strict bootstrap (only plausible, precise geocode is accepted).
  calculateTotalDistance(true).finally(() => { BOOTSTRAP_DONE = true; });
});
