function parseNOK(input) {
  if (input == null) return 0;
  let s = String(input).trim();

  // strip currency/text but keep digits, separators and sign
  s = s.replace(/[^\d.,\- \u00A0\u202F]/g, '');

  // remove ALL spaces including NBSP (U+00A0) and NNBSP (U+202F)
  s = s.replace(/[\s\u00A0\u202F]+/g, '');

  const hasComma = s.includes(',');
  const hasDot   = s.includes('.');

  if (hasComma && hasDot) {
    // assume rightmost separator is decimal
    const lastComma = s.lastIndexOf(',');
    const lastDot   = s.lastIndexOf('.');
    if (lastComma > lastDot) {
      // comma decimal → remove dots (thousands)
      s = s.replace(/\./g, '').replace(/,/g, '.');
    } else {
      // dot decimal → remove commas (thousands)
      s = s.replace(/,/g, '');
    }
  } else if (hasComma) {
    // only comma → treat as decimal
    s = s.replace(/,/g, '.');
  }
  // only dot → already decimal

  const n = parseFloat(s);
  return isNaN(n) ? 0 : n;
}

function parseACFDate(dateStr) {
  // Accepts "dd/mm/yyyy", "dd.mm.yyyy" or "dd-mm-yyyy"
  if (!dateStr) return null;
  const m = String(dateStr).match(/(\d{1,2})[\/.\-](\d{1,2})[\/.\-](\d{4})/);
  if (!m) return null;
  const d = Number(m[1]), mon = Number(m[2]), y = Number(m[3]);
  return new Date(y, mon - 1, d);
}

function parseTimeWindowStart(textOrValue) {
  // Grabs the FIRST "HH:MM" as the window start
  if (!textOrValue) return null;
  const s = String(textOrValue);
  const m = s.match(/(\d{1,2})\s*[:.]\s*(\d{2})/);
  if (!m) return null;
  return { h: Number(m[1]), m: Number(m[2]) };
}

function getTFInfo(selectEl) {

  const isAnyOrNone      = (!s) || /(^|\s)(any|none|velg|ingen)(\s|$)/.test(s);

  return { isKontaktKunde, hasConcreteWindow, isAnyOrNone, raw: text || val };
}


  function parsePrice(value) {

  function parseLabelAndCode(value) {

      return { label, code };
    }
    return { label: '', code: '' };
  }

    const cleanLabel = label.replace(/\s*\(([^)]+)\)$/, '').trim();
    return `${cleanLabel} (${code})`;
  }

			function fieldContainsKun(fieldEl) {
  if (!fieldEl) return false;

  // If select, check selected option text + value
  if (fieldEl.tagName === 'SELECT') {
    const txt = (fieldEl.selectedOptions?.[0]?.textContent || '').toLowerCase();
    const val = (fieldEl.value || '').toLowerCase();
    return txt.includes('kun') || val.includes('kun');
  }

  // Inputs/text
  const v = (fieldEl.value || '').toLowerCase();
  return v.includes('kun');
}

function fieldContainsKunReturn(fieldEl) {
  if (!fieldEl) return false;

  const getTextVal = () => {
    if (fieldEl.tagName === 'SELECT') {
      const txt = (fieldEl.selectedOptions?.[0]?.textContent || '').toLowerCase();
      const val = (fieldEl.value || '').toLowerCase();
      return `${txt} ${val}`;
    }
    return (fieldEl.value || '').toLowerCase();
  };

  const s = getTextVal();
  return s.includes('kun') && s.includes('retur');
}

function layoutHasKunReturn(layout, triggerIds) {
  return triggerIds.some(id => fieldContainsKunReturn(findFieldInLayout(layout, id)));
}


function findFieldInLayout(layout, idOrKey) {
  // Supports both: acff-post-field_XXXXX OR name contains XXXXX (flex content rows)
  return (
    layout.querySelector(`#acff-post-field_${idOrKey}`) ||
    layout.querySelector(`[name*="${idOrKey}"]`) ||
    layout.querySelector(`[id*="${idOrKey}"]`)
  );
}

function layoutHasKun(layout, triggerIds) {
  return triggerIds.some(id => fieldContainsKun(findFieldInLayout(layout, id)));

<script>
(function () {
  // --- the extra pickup input selector
  const EXTRA_INPUT = 'input[name*="field_68248274acd3f"]';

  // helper: let KM writes happen (same gate you use elsewhere)
  function allowKmWrites() {
    try { (window.__kmGate?.allow || window.enableKmWrites || function(){})(); } catch(_) {}
  }

  // do both recalcs + broadcast a signal
  function recalcAll(tag) {
    allowKmWrites();

    // 1) KM
    try { window.calculateTotalDistance && window.calculateTotalDistance(true); } catch(_) {}

    // 2) Prices
    if (typeof window.delayedCalculate === 'function') {
      window.delayedCalculate();
    } else if (typeof window.calculateTotal === 'function') {
      window.calculateTotal();
    }

    // 3) Let other code react if needed
    const count = document.querySelectorAll(EXTRA_INPUT).length;
    if (window.jQuery) jQuery(document).trigger('extra_pickup_changed', [count, tag || '']);
    window.dispatchEvent(new CustomEvent('extra-pickup-change', { detail: { count, tag: tag || '' } }));
  }

  // ACF removes with an animation; run now and again after it settles
  function afterRemove() {
    setTimeout(() => recalcAll('after-remove'), 0);
    setTimeout(() => recalcAll('after-remove-late'), 350);
  }

  // Watch the repeater container for node removals (covers AJAX/edge cases)
  function watchRepeater() {
    // Find a stable ancestor to observe
    const any = document.querySelector(EXTRA_INPUT);
    const root =
      (any && (any.closest('.acf-repeater, .acf-field-repeater, .acf-field[data-type="repeater"], .acf-field'))) ||
      document.body;

    if (!root || root.dataset.extraPickupWatch) return;
    root.dataset.extraPickupWatch = '1';

    new MutationObserver(muts => {
      for (const m of muts) {
        if (m.type !== 'childList') continue;
        // if a removed subtree contained one of our inputs, trigger
        const touched = [...m.removedNodes].some(n =>
          n.nodeType === 1 && (n.matches?.(EXTRA_INPUT) || n.querySelector?.(EXTRA_INPUT))
        );
        if (touched) { afterRemove(); break; }
      }
    }).observe(root, { childList: true, subtree: true });
  }

  // Click hooks for ACF “remove row” buttons across ACF 5/6 variants
  document.addEventListener('click', (e) => {
    const btn = e.target.closest?.(
      '[data-event="remove-row"], [data-event="remove"], ' +    // ACF 6
      '.acf-repeater .acf-row .acf-icon.-minus, ' +             // ACF 5
      '.acf-actions .-remove, .acf-icon.-minusSmall'
    );
    if (btn) setTimeout(afterRemove, 0);
  });

  // ACF JS actions (if available)
  if (window.acf?.addAction) {
    // generic field remove (ACF 5/6)
    acf.addAction('remove', ($el) => {
      const el = $el?.[0] || $el;
      if (el && (el.matches?.(EXTRA_INPUT) || el.querySelector?.(EXTRA_INPUT))) afterRemove();
    });
    // explicit repeater hook (ACF Extended / some builds)
    acf.addAction('remove_row', afterRemove);

    // keep the watcher alive as rows are appended/shown
    acf.addAction('append',  () => setTimeout(watchRepeater, 0));
    acf.addAction('ready',   () => setTimeout(watchRepeater, 0));
    acf.addAction('show_field', () => setTimeout(watchRepeater, 0));
  }

  // boot
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', watchRepeater);
  } else {
    watchRepeater();
  }
})();
</script>

<script>
(function () {
  // Exact time windows to hide (canonical "H:MM - H:MM")
  const EXACT_TIMES = new Set([
    '8:00 - 12:00',
    '11:00 - 15:00',
    '14:00 - 18:00',
    '17:00 - 21:00',
    '10:00 - 14:00',
    '13:00 - 17:00'
  ]);

  const norm = s => (s || '')
    .replace(/\u00A0/g, ' ')          // NBSP → space
    .replace(/[–—−-]/g, '-')          // dashes → hyphen
    .replace(/\s+/g, ' ')             // collapse spaces
    .trim();

  const canonicalWindow = s => {
    const m = norm(s).match(/(\d{1,2}):(\d{2})\s*-\s*(\d{1,2}):(\d{2})/);
    if (!m) return null;
    const [, h1, m1, h2, m2] = m;
    return `${parseInt(h1,10)}:${m1} - ${parseInt(h2,10)}:${m2}`;
  };

  const hasAnyTimeLikeOption = select => {
    for (const opt of select.options) {
      if (canonicalWindow(opt.textContent || '')) return true;
    }
    return false;
  };

  const isInDatepicker = el => !!(el.closest && (
    el.closest('#ui-datepicker-div') ||
    el.classList?.contains('ui-datepicker-month') ||
    el.classList?.contains('ui-datepicker-year') ||
    el.closest('.acf-field-date-picker')
  ));

  // Hide (but don't deselect!) "legacy" everywhere, and EXACT_TIMES only in time-window selects
  function scrubSelect(select) {
    if (!select || isInDatepicker(select)) return;

    const looksLikeTimeWindow = hasAnyTimeLikeOption(select);

    for (const opt of select.options) {
      const label = opt.textContent || '';
      const n     = norm(label).toLowerCase();

      const hideLegacy = n.includes('legacy');
      let   hideTime   = false;

      if (!hideLegacy && looksLikeTimeWindow) {
        const canon = canonicalWindow(label);
        hideTime = !!(canon && EXACT_TIMES.has(canon));
      }

      const shouldHide = hideLegacy || hideTime;

      if (shouldHide && !opt.selected) {
        // Hide from native <select> and inform Select2
        opt.disabled = true;
        opt.hidden   = true;
        opt.setAttribute('aria-disabled', 'true');
        opt.dataset.legacyHidden = '1';
      } else if (opt.selected && (hideLegacy || hideTime)) {
        // Keep saved value visible/enabled
        opt.disabled = false;
        opt.hidden   = false;
        opt.removeAttribute('aria-disabled');
        delete opt.dataset.legacyHidden;
      }
    }
    // No change event — we never alter selection.
  }

// Hide UNCHECKED radios/checkboxes whose label contains "legacy" (case-insensitive)
function scrubChoices(root = document) {
  root.querySelectorAll('input[type="radio"], input[type="checkbox"]').forEach(input => {
    if (isInDatepicker(input)) return;

    const wrapper =
      input.closest('li') ||
      input.closest('label') ||
      input.closest('.acf-radio-list, .acf-checkbox-list') ||
      input.parentElement;

    const text = norm((wrapper ? wrapper.textContent : '') || '').toLowerCase();
    if (!text.includes('legacy')) return;

    if (!input.checked) {
      input.disabled = true;
      input.dataset.legacyHidden = '1';
      if (wrapper && wrapper.style) wrapper.style.display = 'none';
    } else {
      // keep saved legacy selections visible
      input.disabled = false;
      if (wrapper && wrapper.style) wrapper.style.display = '';
      delete input.dataset.legacyHidden;
    }
  });
}


function runScrub(ctx = document) {
  ctx.querySelectorAll('select').forEach(scrubSelect);
  scrubChoices(ctx);   // instead of scrubRadios(ctx)
}


  document.addEventListener('DOMContentLoaded', () => runScrub());
  window.addEventListener('load', () => runScrub());

  // ACF lifecycle hooks (covers flexible content add/append/show)
  if (window.acf && typeof acf.addAction === 'function') {
    acf.addAction('ready append show_field', ($el) => {
      const ctx = ($el && $el[0]) ? $el[0] : document;
      runScrub(ctx);
    });
  }

  // Catch late DOM mutations (cloned rows, AJAX choice loads, etc.)
  const mo = new MutationObserver(() => {
    clearTimeout(runScrub._t);
    runScrub._t = setTimeout(() => runScrub(), 60);
  });
  mo.observe(document.body, { childList: true, subtree: true });

  // Bonus: when a Select2 dropdown opens, ensure disabled items stay hidden
  if (window.jQuery && jQuery.fn && jQuery.fn.select2) {
    jQuery(document).on('select2:open', () => {
      // The CSS rule already hides aria-disabled items; this is just a safety pass
      document.querySelectorAll('.select2-results__option').forEach(li => {
        const t = norm(li.textContent || '').toLowerCase();
        const isLegacy = t.includes('legacy');
        const canon = canonicalWindow(t);
        const isExactTime = !!(canon && EXACT_TIMES.has(canon));
        if (isLegacy || isExactTime) {
          li.setAttribute('aria-disabled', 'true');
          li.style.display = 'none';
        }
      });
    });
  }
})();
</script>
