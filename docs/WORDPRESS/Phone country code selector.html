<script>
document.addEventListener('DOMContentLoaded', function () {
  function initIntlTelField(inputName, hiddenName, fieldClass = '') {
    const input = document.querySelector(`input[name="${inputName}"]`);
    const hidden = hiddenName ? document.querySelector(`input[name="${hiddenName}"]`) : null;

    if (input && typeof intlTelInput !== 'undefined') {
      const iti = window.intlTelInput(input, {
        initialCountry: "no",
        preferredCountries: ["no", "se", "dk"],
        separateDialCode: true,
				 autoPlaceholder: "off",
        utilsScript: "https://cdn.jsdelivr.net/npm/intl-tel-input@18.2.1/build/js/utils.js"
      });
input.setAttribute('placeholder', '');

      if (hidden && hidden.value) {
        iti.setNumber(hidden.value);
      } else {
        iti.setCountry("no");
      }

      const updateHidden = () => {
        if (hidden) hidden.value = iti.getNumber();
      };

      input.addEventListener('input', updateHidden);
      input.addEventListener('change', updateHidden);
      input.addEventListener('blur', updateHidden);
      updateHidden();

      if (fieldClass) {
        input.closest(`.acf-field-${fieldClass}`)?.classList.add('iti-init');
      }
    }
  }

  // Init for each field
  initIntlTelField('acff[post][field_681b2332f7eff]', 'acff[post][field_6867d572a7457]', '681b2332f7eff'); // Customer phone
  initIntlTelField('acff[post][field_6823595de4d61]', 'acff[post][field_686e7b9f82d6d]', '6823595de4d61'); // Kasserers phone
  initIntlTelField('acff[post][field_6880cbf9928bc]', null, '6880cbf9928bc'); // Ekstra kundens telefon (no hidden field)
});
</script>
